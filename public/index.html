<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Movies</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Myanmar:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #090a0f;
            --bg-card: #151821;
            --bg-nav: #0d0f14;
            --primary: #3b82f6; /* Professional Blue */
            --primary-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #1e222d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', 'Noto Sans Myanmar', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
        }

        /* --- Navigation & Search Bar --- */
        nav {
            background-color: var(--bg-nav);
            border-bottom: 1px solid var(--border-color);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .logo {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: var(--text-main);
        }
        
        .logo span {
            color: var(--primary);
        }

        .search-container {
            position: relative;
            width: 100%;
            max-width: 400px;
        }

        .search-input {
            width: 100%;
            padding: 10px 15px;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-main);
            font-size: 0.95rem;
            outline: none;
            transition: all 0.2s ease;
        }

        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        /* --- Main Content Grid --- */
        main {
            padding: 30px 5%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 24px;
        }

        /* --- Movie Card --- */
        .movie-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s ease, border-color 0.2s ease;
            display: flex;
            flex-direction: column;
        }

        .movie-card:hover {
            transform: translateY(-4px);
            border-color: #33394a;
        }

        .movie-card img {
            width: 100%;
            height: 280px;
            object-fit: cover;
        }

        .movie-info {
            padding: 16px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .movie-info h3 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 6px;
            line-height: 1.4;
        }

        .movie-info span {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 50px;
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* --- Modal (Popup) --- */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        @media (min-width: 768px) {
            .modal-content {
                flex-direction: row;
                overflow: hidden;
            }
            .modal-left { width: 40%; }
            .modal-right { width: 60%; padding: 40px 30px; overflow-y: auto; max-height: 90vh; }
            .modal-left img { height: 100%; width: 100%; object-fit: cover; }
        }

        @media (max-width: 767px) {
            .modal-left img { width: 100%; max-height: 350px; object-fit: cover; display: block; }
            .modal-right { padding: 25px 20px; }
        }

        .close-btn {
            position: absolute;
            right: 20px; top: 15px;
            color: var(--text-muted);
            font-size: 28px;
            font-weight: 300;
            cursor: pointer;
            transition: color 0.2s;
            z-index: 10;
            background: rgba(0,0,0,0.5);
            width: 35px; height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:hover { color: #fff; background: rgba(0,0,0,0.8); }

        .modal-title { font-size: 1.7rem; font-weight: 700; margin-bottom: 8px; line-height: 1.3; }
        .modal-year { font-size: 0.95rem; color: var(--text-muted); margin-bottom: 25px; }
        
        .synopsis-title { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 10px; font-weight: 600; }
        .synopsis-text { line-height: 1.7; color: #d1d5db; font-size: 0.95rem; margin-bottom: 30px; }

        .watch-btn {
            display: inline-block;
            width: 100%;
            text-align: center;
            background-color: var(--primary);
            color: white;
            padding: 14px 20px;
            text-decoration: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 500;
            transition: background-color 0.2s;
        }

        .watch-btn:hover { background-color: var(--primary-hover); }

        /* Responsive Nav */
        @media (max-width: 600px) {
            nav { flex-direction: column; gap: 15px; }
            .search-container { max-width: 100%; }
            .movies-grid { grid-template-columns: repeat(2, 1fr); gap: 16px; }
            .movie-card img { height: 220px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Premium<span>Movies</span></div>
        <div class="search-container">
            <input type="text" id="searchInput" class="search-input" placeholder="Search movies by title..." onkeyup="handleSearch()">
        </div>
    </nav>
    
    <main>
        <div id="moviesGrid" class="movies-grid">
            </div>
    </main>

    <div id="movieModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            
            <div class="modal-left">
                <img id="modalImg" src="" alt="Movie Poster">
            </div>
            
            <div class="modal-right">
                <h2 id="modalTitle" class="modal-title"></h2>
                <div class="modal-year">Released: <span id="modalYear"></span></div>
                
                <div class="synopsis-title">Synopsis</div>
                <p id="modalSynopsis" class="synopsis-text"></p>

                <a id="modalLink" href="#" target="_blank" class="watch-btn">
                    Watch on Telegram
                </a>
            </div>
        </div>
    </div>

    <script>
        let allMovies = []; // ရုပ်ရှင် Data များကို ခေတ္တသိမ်းထားမည့် နေရာ (Search လုပ်ရန်)

        document.addEventListener("DOMContentLoaded", fetchMovies);

        async function fetchMovies() {
            try {
                const response = await fetch('/api/movies');
                allMovies = await response.json();
                renderMovies(allMovies); // စစချင်း ရုပ်ရှင်အားလုံးကို ပြမည်
            } catch (error) {
                console.error("Data ဆွဲယူရာတွင် အမှားဖြစ်နေပါသည်: ", error);
            }
        }

        // ရုပ်ရှင်များကို Web ပေါ်တွင် ဖော်ပြမည့် Function
        function renderMovies(movies) {
            const grid = document.getElementById('moviesGrid');
            grid.innerHTML = ''; 

            if (movies.length === 0) {
                grid.innerHTML = `<div class="no-results">No movies found.</div>`;
                return;
            }

            movies.forEach(movie => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.innerHTML = `
                    <img src="/api/image/${movie.posterFileId}" alt="${movie.title}" loading="lazy">
                    <div class="movie-info">
                        <h3>${movie.title}</h3>
                        <span>${movie.year}</span>
                    </div>
                `;
                card.onclick = () => openModal(movie);
                grid.appendChild(card);
            });
        }

        // Search Bar တွင် စာရိုက်တိုင်း အလုပ်လုပ်မည့် Function
        function handleSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            // ရိုက်ထည့်လိုက်သော စာသားနှင့် တူညီသည့် ရုပ်ရှင်များကို စစ်ထုတ်မည်
            const filteredMovies = allMovies.filter(movie => 
                movie.title.toLowerCase().includes(query)
            );
            renderMovies(filteredMovies);
        }

        function openModal(movie) {
            document.getElementById('modalImg').src = `/api/image/${movie.posterFileId}`;
            document.getElementById('modalTitle').innerText = movie.title;
            document.getElementById('modalYear').innerText = movie.year;
            document.getElementById('modalSynopsis').innerText = movie.synopsis;
            
            const linkBtn = document.getElementById('modalLink');
            if(movie.telegramLink) {
                linkBtn.style.display = 'block';
                linkBtn.href = movie.telegramLink;
            } else {
                linkBtn.style.display = 'none';
            }
            
            const modal = document.getElementById('movieModal');
            modal.style.display = 'flex'; // Changed to flex for center alignment
            document.body.style.overflow = 'hidden'; 
        }

        function closeModal() {
            document.getElementById('movieModal').style.display = 'none';
            document.body.style.overflow = 'auto'; 
        }

        window.onclick = function(event) {
            const modal = document.getElementById('movieModal');
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>

</body>
</html>
