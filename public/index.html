<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Movies</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Myanmar:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #090a0f;
            --bg-card: #151821;
            --bg-nav: #0d0f14;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #1e222d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', 'Noto Sans Myanmar', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
        }

        nav {
            background-color: var(--bg-nav);
            border-bottom: 1px solid var(--border-color);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .logo { font-size: 1.4rem; font-weight: 700; letter-spacing: 0.5px; }
        .logo span { color: var(--primary); }

        .search-container { position: relative; width: 100%; max-width: 400px; }
        .search-input {
            width: 100%; padding: 10px 15px; background-color: var(--bg-card);
            border: 1px solid var(--border-color); border-radius: 6px;
            color: var(--text-main); font-size: 0.95rem; outline: none; transition: all 0.2s ease;
        }
        .search-input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); }

        main { padding: 30px 5%; max-width: 1400px; margin: 0 auto; }

        /* 💻 ကွန်ပျူတာ (Desktop) အတွက် ၆ တန်း */
        .movies-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr); 
            gap: 24px;
        }

        /* 📱 Tablet အကြီးများအတွက် ၄ တန်း (1024px အောက်) */
        @media (max-width: 1024px) {
            .movies-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        /* 📱 Tablet အသေးနှင့် ဖုန်းအကြီးများအတွက် ၃ တန်း (768px အောက်) */
        @media (max-width: 768px) {
            .movies-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 20px; /* ကြားဟွာနယ် အနည်းငယ် ကျုံ့မည် */
            }
        }

        /* 📱 ဖုန်းများအတွက် ၂ တန်း (600px အောက်) */
        @media (max-width: 600px) {
            .movies-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 16px;
            }
        }
        
        .movie-card {
            background-color: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: 8px; overflow: hidden; cursor: pointer;
            transition: transform 0.2s ease, border-color 0.2s ease;
            display: flex; flex-direction: column;
        }
        .movie-card:hover { transform: translateY(-4px); border-color: #33394a; }
        .movie-card img { width: 100%; height: 280px; object-fit: cover; }
        
        .movie-info { padding: 16px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .movie-info h3 { font-size: 1rem; font-weight: 600; margin-bottom: 6px; line-height: 1.4; }
        .movie-info span { font-size: 0.85rem; color: var(--text-muted); }

        .no-results { grid-column: 1 / -1; text-align: center; padding: 50px; color: var(--text-muted); font-size: 1.1rem; }

        /* --- 🌟 Pagination CSS (အသစ်) --- */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 40px;
            flex-wrap: wrap;
        }
        .page-btn {
            background-color: var(--bg-card);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.95rem;
        }
        .page-btn:hover { border-color: var(--primary); color: var(--primary); }
        .page-btn.active { background-color: var(--primary); color: white; border-color: var(--primary); }
        .page-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* 🌟 Pagination အစက်လေးများအတွက် ဒီဇိုင်း */
        .page-dots {
            color: var(--text-muted);
            padding: 8px 4px;
            font-weight: 600;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
        }

       /* Banner Container ၏ Responsive အချိုးအစားများ */
        .banner-container {
            position: relative;
            overflow: hidden;
            width: 100%;
            max-width: 1400px;
            margin: 20px auto 0 auto;
            aspect-ratio: 9 / 1; /* ကွန်ပျူတာအတွက် 1:9 အချိုး */
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-card);
        }

        /* ဖုန်းနှင့် Tablet များအတွက် Banner ကို အနည်းငယ် ပိုကျယ်ပေးမည် (စာဖတ်ရလွယ်စေရန်) */
        @media (max-width: 768px) {
            .banner-container { aspect-ratio: 5 / 1; }
        }
        @media (max-width: 480px) {
            .banner-container { aspect-ratio: 4 / 1; margin-top: 15px; }
        }

        /* ညာမှဘယ်သို့ Smooth Slide ဖြစ်စေမည့် Animation */
        .banner-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: translateX(100%); /* မူလတွင် ညာဘက်သို့ ဖွက်ထားမည် */
            transition: transform 0.6s ease-in-out; /* 0.6s ဖြင့် ချောမွေ့စွာ ရွေ့မည် */
            display: block;
        }

        /* လက်ရှိပြသမည့်ပုံ */
        .banner-slide.active {
            transform: translateX(0);
        }

        /* ပြီးသွားသောပုံကို ဘယ်ဘက်သို့ တွန်းထုတ်မည် */
        .banner-slide.prev {
            transform: translateX(-100%);
        }

        .banner-media {
            width: 100%;
            height: 100%;
            /* 🌟 cover အစား contain သို့ ပြောင်းလိုက်ပါ */
            object-fit: contain; 
            pointer-events: none;
            background-color: var(--bg-card); 
        }
        /* Modal Design */
        .modal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0;
            width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px); align-items: center; justify-content: center;
        }
        .modal-content {
            background-color: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: 12px; width: 90%; max-width: 800px; max-height: 90vh;
            overflow-y: auto; position: relative; display: flex; flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        @media (min-width: 768px) {
            .modal-content { flex-direction: row; overflow: hidden; }
            .modal-left { width: 40%; }
            .modal-right { width: 60%; padding: 40px 30px; overflow-y: auto; max-height: 90vh; }
            .modal-left img { height: 100%; width: 100%; object-fit: cover; }
        }
        @media (max-width: 767px) {
            .modal-left img { width: 100%; max-height: 350px; object-fit: cover; display: block; }
            .modal-right { padding: 25px 20px; }
        }

        /* --- 🌟 Ads Page (Full Screen) --- */
        .ad-page {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #0b0d13; z-index: 2000; flex-direction: column;
            align-items: center; justify-content: center; padding: 20px;
        }
        .ad-container { max-width: 500px; width: 100%; text-align: center; }
        .ad-image { width: 100%; max-height: 400px; object-fit: contain; border-radius: 12px; margin-bottom: 20px; cursor: pointer; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .ad-timer { font-size: 1.2rem; font-weight: 500; color: var(--text-muted); margin-bottom: 20px; }
        .ad-continue-btn {
            display: none; width: 100%; background-color: var(--primary); color: white;
            padding: 16px; border-radius: 8px; font-size: 1.1rem; font-weight: 600;
            text-decoration: none; transition: 0.3s;
        }
        .ad-continue-btn:hover { background-color: var(--primary-hover); transform: scale(1.02); }

        .close-btn {
            position: absolute; right: 20px; top: 15px; color: var(--text-muted);
            font-size: 28px; cursor: pointer; transition: color 0.2s; z-index: 10;
            background: rgba(0,0,0,0.5); width: 35px; height: 35px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
        .close-btn:hover { color: #fff; background: rgba(0,0,0,0.8); }

        .modal-title { font-size: 1.7rem; font-weight: 700; margin-bottom: 8px; line-height: 1.3; }
        .modal-year { font-size: 0.95rem; color: var(--text-muted); margin-bottom: 25px; }
        .synopsis-title { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 10px; font-weight: 600; }
        .synopsis-text { line-height: 1.7; color: #d1d5db; font-size: 0.95rem; margin-bottom: 30px; }
        
        .watch-btn {
            display: inline-block; width: 100%; text-align: center;
            background-color: var(--primary); color: white; padding: 14px 20px;
            text-decoration: none; border-radius: 6px; font-size: 1rem; font-weight: 500; transition: background-color 0.2s;
        }
        .watch-btn:hover { background-color: var(--primary-hover); }

    </style>
</head>
<body>

    <nav>
        <div class="logo">Premium<span>Movies</span></div>
        <div class="search-container">
            <input type="text" id="searchInput" class="search-input" placeholder="Search movies by title..." onkeyup="handleSearch()">
        </div>
    </nav>
     <div id="headerBannerContainer" class="banner-container" style="display: none;">
        <a id="headerBannerLink" href="#" target="_blank" style="display: block; width: 100%; transition: transform 0.2s ease;">
            <img id="headerBannerImg" src="" alt="Sponsor Banner" style="width: 100%; max-height: 150px; object-fit: cover; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); border: 1px solid var(--border-color);">
        </a>
    </div>
    
    <main>
        <div id="moviesGrid" class="movies-grid">
            </div>
        
        <div id="pagination" class="pagination"></div>
    </main>

    <div id="movieModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div class="modal-left"><img id="modalImg" src="" alt="Movie Poster"></div>
            <div class="modal-right">
                <h2 id="modalTitle" class="modal-title"></h2>
                <div class="modal-year">Released: <span id="modalYear"></span></div>
                <div class="synopsis-title">Synopsis</div>
                <p id="modalSynopsis" class="synopsis-text"></p>
                <a id="modalLink" href="#" target="_blank" class="watch-btn">Watch on Telegram</a>
            </div>
        </div>
    </div>

    <div id="adPage" class="ad-page">
        <div class="ad-container">
            <p style="color: var(--text-muted); margin-bottom: 12px; font-size: 0.85rem; letter-spacing: 1px; text-transform: uppercase;">Sponsored Advertisement</p>
            
            <a id="adSponsorLink" href="#" target="_blank">
                <img id="adImg" class="ad-image" src="" alt="Advertisement" style="display: none;">
            </a>
            
            <div id="adTimer" class="ad-timer">Please wait <span id="adSeconds" style="color: white; font-weight: bold;">6</span> seconds...</div>
            
            <a id="adContinueBtn" href="#" target="_blank" class="ad-continue-btn" onclick="closeAdPage()">
                Continue to Telegram
            </a>
        </div>
    </div>

    <script>
        let allMovies = []; 
        let currentFilteredMovies = []; 
        
        // 🌟 Pagination အတွက် Variables များ
        let currentPage = 1;
        const moviesPerPage = 12; // တစ်မျက်နှာလျှင် ရုပ်ရှင် (၁၂) ကား ပြမည် (မိမိကြိုက်သလို ပြင်နိုင်သည်)

        document.addEventListener("DOMContentLoaded", fetchMovies);

        // Website ပွင့်သည်နှင့် Banner ကိုဆွဲယူပြီး Auto-slide လုပ်မည်
        fetch('/api/banner')
            .then(res => res.json())
            .then(banners => {
                const container = document.getElementById('headerBannerContainer');
                
                if (banners && banners.length > 0) {
                    container.innerHTML = ''; 
                    container.style.display = 'block';

                    // Banner အားလုံးကို ထည့်သွင်းခြင်း
                    banners.forEach((banner, index) => {
                        const linkWrap = document.createElement('a');
                        linkWrap.href = banner.link || '#';
                        linkWrap.target = '_blank'; // Link ကို Tab အသစ်ဖြင့် ဖွင့်မည်
                        
                        // ပထမဆုံးပုံကို 'active' ပေးထားပြီး ကျန်ပုံများကို ညာဘက်တွင် စောင့်ခိုင်းထားမည်
                        linkWrap.className = index === 0 ? 'banner-slide active' : 'banner-slide';
                        
                        if (banner.isVideo) {
                            linkWrap.innerHTML = `<video src="/api/image/${banner.fileId}" class="banner-media" autoplay loop muted playsinline></video>`;
                        } else {
                            linkWrap.innerHTML = `<img src="/api/image/${banner.fileId}" class="banner-media" alt="Sponsor Banner">`;
                        }
                        container.appendChild(linkWrap);
                    });

                    // Banner (၁) ပုံထက်ပိုပါက Slide စနစ်ကို အလုပ်လုပ်စေမည်
                    if (banners.length > 1) {
                        let currentBannerIndex = 0;
                        const slides = container.querySelectorAll('.banner-slide');
                        
                        setInterval(() => {
                            const prevIndex = currentBannerIndex;
                            currentBannerIndex = (currentBannerIndex + 1) % slides.length;
                            
                            // လက်ရှိပုံကို ဘယ်ဘက်သို့ တွန်းထုတ်မည်
                            slides[prevIndex].className = 'banner-slide prev';
                            
                            // နောက်လာမည့်ပုံကို ညာဘက်တွင် အဆင်သင့်ပြင်မည် (Animation မပါဘဲ ချက်ချင်းရွှေ့ရန်)
                            slides[currentBannerIndex].className = 'banner-slide';
                            void slides[currentBannerIndex].offsetWidth; // Browser ကို Force Reflow လုပ်ခိုင်းခြင်း
                            
                            // ညာဘက်မှနေ၍ အလယ်သို့ Smooth Slide ဖြင့် ဝင်လာစေမည်
                            slides[currentBannerIndex].className = 'banner-slide active';
                        }, 4000); // ၄ စက္ကန့် တစ်ခါ ပြောင်းမည်
                    }
                } else {
                    container.style.display = 'none';
                }
            })
            .catch(err => console.log("Banner loading error"));

        async function fetchMovies() {
            try {
                const response = await fetch('/api/movies');
                let fetchedMovies = await response.json();
                
                // 🌟 (အသစ်ထည့်ထားသောအပိုင်း) ရရှိလာသော ရုပ်ရှင်များကို ကျပန်း (Random) မွှေနှောက်ခြင်း
                fetchedMovies.sort(() => Math.random() - 0.5);
                
                allMovies = fetchedMovies;
                currentFilteredMovies = allMovies; 
                renderMoviesAndPagination(); 
            } catch (error) {
                console.error("Data ဆွဲယူရာတွင် အမှားဖြစ်နေပါသည်: ", error);
            }
        }

        // 🌟 ရုပ်ရှင်များနှင့် Page ခလုတ်များကို ပေါင်းပြီး ပြမည့် Function
        function renderMoviesAndPagination() {
            const grid = document.getElementById('moviesGrid');
            const paginationContainer = document.getElementById('pagination');
            grid.innerHTML = ''; 
            paginationContainer.innerHTML = '';

            if (currentFilteredMovies.length === 0) {
                grid.innerHTML = `<div class="no-results">No movies found.</div>`;
                return;
            }

            // လက်ရှိ Page အတွက် ပြရမည့် ရုပ်ရှင်များကို ခွဲထုတ်ခြင်း (Slice)
            const startIndex = (currentPage - 1) * moviesPerPage;
            const endIndex = startIndex + moviesPerPage;
            const paginatedMovies = currentFilteredMovies.slice(startIndex, endIndex);

            // ရုပ်ရှင်များကို Grid ထဲ ထည့်ခြင်း နှင့် Views ပြခြင်း
            paginatedMovies.forEach(movie => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.innerHTML = `
                    <img src="/api/image/${movie.posterFileId}" alt="${movie.title}" loading="lazy">
                    <div class="movie-info">
                        <h3>${movie.title}</h3>
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 5px;">
                            <span>${movie.year}</span>
                            
                            <span id="views-${movie._id}" style="font-size: 0.8rem; color: var(--text-muted); display: flex; align-items: center; gap: 4px;">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                                ...
                            </span>
                            
                        </div>
                    </div>
                `;
                card.onclick = () => openModal(movie);
                grid.appendChild(card);

                // 🌟 Website ပွင့်လာသည်နှင့် နောက်ကွယ်မှ Views အရေအတွက်ကို လှမ်းတောင်းခြင်း
                if (movie.telegramLink) {
                    fetch(`/api/views?link=${encodeURIComponent(movie.telegramLink)}`)
                        .then(res => res.json())
                        .then(data => {
                            const viewSpan = document.getElementById(`views-${movie._id}`);
                            if(viewSpan) {
                                viewSpan.innerHTML = `
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                                    ${data.views}
                                `;
                            }
                        })
                        .catch(err => console.log("Views ဆွဲယူ၍ မရပါ။"));
                } else {
                    // Link မရှိလျှင် Views အကွက်ကို ဖျောက်ထားမည်
                    document.getElementById(`views-${movie._id}`).style.display = 'none';
                }
            });
            
            // Pagination ခလုတ်များကို တည်ဆောက်ခြင်း
            renderPagination();
        }

        // 🌟 Page ခလုတ်များ ဖန်တီးသည့် Function (Smart Pagination အသစ်)
        function renderPagination() {
            const totalPages = Math.ceil(currentFilteredMovies.length / moviesPerPage);
            const paginationContainer = document.getElementById('pagination');

            if (totalPages <= 1) return; // (၁) မျက်နှာတည်းဆိုလျှင် ခလုတ်များ မပြပါ

            let buttonsHTML = '';

            // Previous (ရှေ့သို့) ခလုတ်
            if (currentPage > 1) {
                buttonsHTML += `<button class="page-btn" onclick="changePage(${currentPage - 1})">« Prev</button>`;
            }

            // 🌟 ပြသမည့် Page နံပါတ်များကို တွက်ချက်ခြင်း (ဥပမာ 1 ... 4 5 6 ... 100)
            let startPage, endPage;
            if (totalPages <= 5) {
                // Page ၅ မျက်နှာအောက် ဆိုလျှင် အကုန်ပြမည်
                startPage = 1;
                endPage = totalPages;
            } else {
                // Page ၅ မျက်နှာထက် ကျော်လျှင် အလယ်ကိုပဲ ရွေးပြမည်
                if (currentPage <= 3) {
                    startPage = 1;
                    endPage = 4;
                } else if (currentPage + 2 >= totalPages) {
                    startPage = totalPages - 3;
                    endPage = totalPages;
                } else {
                    startPage = currentPage - 1;
                    endPage = currentPage + 1;
                }
            }

            // ပထမဆုံး Page (1) နှင့် အစက်များ (...)
            if (startPage > 1) {
                buttonsHTML += `<button class="page-btn" onclick="changePage(1)">1</button>`;
                if (startPage > 2) {
                    buttonsHTML += `<span class="page-dots">...</span>`;
                }
            }

            // အလယ် Page နံပါတ်များ
            for (let i = startPage; i <= endPage; i++) {
                buttonsHTML += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
            }

            // နောက်ဆုံး Page နှင့် အစက်များ (...)
            if (endPage < totalPages) {
                if (endPage < totalPages - 1) {
                    buttonsHTML += `<span class="page-dots">...</span>`;
                }
                buttonsHTML += `<button class="page-btn" onclick="changePage(${totalPages})">${totalPages}</button>`;
            }

            // Next (နောက်သို့) ခလုတ်
            if (currentPage < totalPages) {
                buttonsHTML += `<button class="page-btn" onclick="changePage(${currentPage + 1})">Next »</button>`;
            }

            paginationContainer.innerHTML = buttonsHTML;
        }

        // 🌟 Page နံပါတ် ပြောင်းသည့်အခါ အလုပ်လုပ်မည့် Function
        function changePage(page) {
            currentPage = page;
            renderMoviesAndPagination();
            // Page အသစ်ပြောင်းတိုင်း အပေါ်ဆုံးသို့ အလိုအလျောက် ပြန်ရွှေ့ပေးမည်
            window.scrollTo({ top: 0, behavior: 'smooth' }); 
        }

        function handleSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            currentFilteredMovies = allMovies.filter(movie => 
                movie.title.toLowerCase().includes(query)
            );
            currentPage = 1; // 🌟 Search လုပ်လျှင် Page 1 သို့ ပြန်သွားမည်
            renderMoviesAndPagination();
        }

        function openModal(movie) {
            document.getElementById('modalImg').src = `/api/image/${movie.posterFileId}`;
            document.getElementById('modalTitle').innerText = movie.title;
            document.getElementById('modalYear').innerText = movie.year;
            document.getElementById('modalSynopsis').innerText = movie.synopsis;
            
            // အဟောင်းနေရာတွင် အစားထိုးရန် (Telegram အစား Ads Page သို့ လွှဲမည်)
            const linkBtn = document.getElementById('modalLink');
            if(movie.telegramLink) {
                linkBtn.style.display = 'block'; 
                linkBtn.onclick = (e) => {
                    e.preventDefault(); // တိုက်ရိုက်သွားခြင်းကို တားမည်
                    showAdPage(movie.telegramLink); // Ads Page သို့ ခေါ်မည်
                };
            } else {
                linkBtn.style.display = 'none';
            }
            
            const modal = document.getElementById('movieModal');
            modal.style.display = 'flex'; 
            document.body.style.overflow = 'hidden'; 
        }

        function closeModal() {
            document.getElementById('movieModal').style.display = 'none';
            document.body.style.overflow = 'auto'; 
        }

        window.onclick = function(event) {
            const modal = document.getElementById('movieModal');
            if (event.target == modal) { closeModal(); }
        }

        let adData = null;

        // Website စပွင့်သည်နှင့် ကြော်ငြာကို ကြိုခေါ်ထားမည် (ပိုမြန်စေရန်)
        fetch('/api/ad').then(res => res.json()).then(data => adData = data);

        function showAdPage(telegramLink) {
            closeModal(); // ရုပ်ရှင် Modal ကို ပိတ်မည်

            // 🌟 ကြော်ငြာမရှိလျှင် Ads Page ကို မပြဘဲ Telegram သို့ တိုက်ရိုက်သွားမည်
            if (!adData || !adData.adFileId) {
                window.open(telegramLink, '_blank');
                return;
            }

            // 🌟 ကြော်ငြာရှိမှသာ အောက်ပါ Ads Page ကို ပြမည်
            const adPage = document.getElementById('adPage');
            const adImg = document.getElementById('adImg');
            const adSponsorLink = document.getElementById('adSponsorLink');
            const adTimer = document.getElementById('adTimer');
            const adSeconds = document.getElementById('adSeconds');
            const adContinueBtn = document.getElementById('adContinueBtn');

            adImg.src = `/api/image/${adData.adFileId}`;
            adImg.style.display = 'block';
            adSponsorLink.href = adData.adLink || '#';

            // UI မူလအတိုင်း ပြန်ထားခြင်း
            adContinueBtn.style.display = 'none';
            adTimer.style.display = 'block';
            adPage.style.display = 'flex'; // Ads Page ကို ဖွင့်မည်
            document.body.style.overflow = 'hidden';

            let timeLeft = 8; //  စက္ကန့် သတ်မှတ်ချက်
            adSeconds.innerText = timeLeft;

            // Countdown ရေတွက်ခြင်း
            const countdown = setInterval(() => {
                timeLeft--;
                adSeconds.innerText = timeLeft;

                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    adTimer.style.display = 'none'; 
                    adContinueBtn.href = telegramLink; 
                    adContinueBtn.style.display = 'block'; 
                }
            }, 1000);
        }
    </script>

</body>
